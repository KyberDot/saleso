version: '3.8'

services:

  saleso:
    image: ghcr.io/kyberdot/saleso:latest
    container_name: saleso
    restart: unless-stopped
    mem_limit: 512mb
    ports:
      - "127.0.0.1:3820:3001"
    environment:
      - NODE_ENV=production
      - EBAY_CLIENT_ID=${EBAY_CLIENT_ID}
      - EBAY_CLIENT_SECRET=${EBAY_CLIENT_SECRET}
      - EBAY_REDIRECT_URI=${EBAY_REDIRECT_URI}
      - EBAY_ENV=${EBAY_ENV}
      - SESSION_SECRET=${SALESO_SESSION_SECRET}
      - FRONTEND_URL=https://saleso.app
      - EBAY_DELETION_TOKEN=${EBAY_DELETION_TOKEN}
      - EBAY_DELETION_ENDPOINT=${EBAY_DELETION_ENDPOINT}
      - DATA_DIR=/app/data
      - UPLOADS_DIR=/app/uploads
    volumes:
      - ./config/data:/app/data
      - ./config/uploads:/app/uploads
    networks:
      - media-network
      - authentik_secure

networks:
  media-network:
    external: true
  authentik_secure:
    external: true
